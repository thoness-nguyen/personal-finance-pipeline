# =============================================================================
# File: .github/workflows/etl_pipeline.yml
# Purpose: GitHub Actions workflow that runs the pipeline orchestrator on a
#          daily schedule (2 AM UTC) and supports manual trigger.
#          Spins up Docker services inside the runner, then calls the orchestrator.
# =============================================================================

name: ETL Pipeline

on:
  schedule:
    - cron: "0 22 * * *"   # Daily at 22:00 Asia/Ho_Chi_Minh
      timezone: "Asia/Ho_Chi_Minh"
  workflow_dispatch:
    inputs:
      service:
        description: "Ingestion service to use (python | nodejs | auto)"
        required: false
        default: "auto"

jobs:
  run-etl:
    name: Run ETL Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write credentials files
        run: |
          mkdir -p credentials
          printf '%s' '${{ secrets.GCP_SA_KEY }}' > credentials/finance-pipeline-gcs-writer-dev.json
          printf '%s' '${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}' > credentials/finance-pipeline-sheets-reader-dev.json

      - name: Create .env file
        run: |
          cat <<'EOF' > .env
          SHEET_ID=${{ secrets.SHEET_ID }}
          SHEET_NAME=${{ secrets.SHEET_NAME }}
          GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}
          GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/finance-pipeline-gcs-writer-dev.json
          GOOGLE_SHEETS_CREDENTIALS=/app/credentials/finance-pipeline-sheets-reader-dev.json
          PYTHON_API_PORT=8000
          NODE_API_PORT=3000
          EOF

      - name: Validate required secrets
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
        run: |
          missing=()
          [ -z "$SHEET_ID" ]                       && missing+=("SHEET_ID")
          [ -z "$SHEET_NAME" ]                     && missing+=("SHEET_NAME")
          [ -z "$GCS_BUCKET_NAME" ]                && missing+=("GCS_BUCKET_NAME")
          [ -z "$GCP_SA_KEY" ]                     && missing+=("GCP_SA_KEY")
          [ -z "$GOOGLE_SHEETS_CREDENTIALS_JSON" ] && missing+=("GOOGLE_SHEETS_CREDENTIALS_JSON")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: Missing required GitHub secrets: ${missing[*]}"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Build Docker images
        run: docker compose build python-api nodejs-fallback

      - name: Start Docker services
        run: docker compose up -d python-api nodejs-fallback

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to start..."
          HEALTHY=false
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health -o /dev/null && \
               curl -sf http://localhost:3000/health -o /dev/null; then
              echo "Both services are up after $i attempt(s)"
              HEALTHY=true
              break
            fi
            PY_STATUS=$(curl -sf http://localhost:8000/health -o /dev/null && echo ok || echo fail)
            ND_STATUS=$(curl -sf http://localhost:3000/health -o /dev/null && echo ok || echo fail)
            echo "Attempt $i/60 — python=$PY_STATUS nodejs=$ND_STATUS — retrying in 5s..."
            sleep 5
          done
          if [ "$HEALTHY" != "true" ]; then
            echo "Services failed to start. Docker logs:"
            docker compose logs python-api
            docker compose logs nodejs-fallback
            exit 1
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install orchestrator dependencies
        run: pip install httpx python-dotenv

      - name: Run pipeline orchestrator
        env:
          PYTHON_API_URL: http://localhost:8000
          NODEJS_API_URL: http://localhost:3000
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
        run: |
          python orchestrator/run_pipeline.py \
            --service "${{ github.event.inputs.service || 'auto' }}"

      - name: Stop Docker services
        if: always()
        run: docker compose down
