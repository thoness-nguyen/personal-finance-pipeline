# models/staging/stg_expenses.yml
# =============================================================================
# File: transformation/dbt_project/models/staging/stg_expenses.yml
# Purpose: Column-level documentation and generic test definitions for the
#          stg_expenses staging model.
# =============================================================================

version: 2

models:
  - name: stg_expenses
    description: "Cleaned expense and credit_purchase rows enriched with account, category, and subcategory names"
    columns:
      - name: id
        description: "transaction_id from the transactions table"
        tests:
          - not_null
          - unique
      - name: expense_date
        description: "Date the expense occurred (DATE)"
        tests:
          - not_null
      - name: yr
        description: "Year of expense_date"
      - name: mo
        description: "Month of expense_date"
      - name: amount
        description: "Expense amount in VND (always positive)"
        tests:
          - not_null
      - name: account_name
        description: "Bank account or credit card name"
      - name: account_type
        description: "savings | expense | credit"
      - name: currency
        description: "ISO currency code (e.g. VND)"
      - name: transaction_type
        description: "expense or credit_purchase"
      - name: spending_type
        description: "fixed = planned monthly budget, extra = unplanned"
      - name: category_id
        description: "Foreign key to categories"
        tests:
          - not_null
      - name: category_name
        description: "Category name (e.g. Food & Drinks)"
      - name: subcategory_id
        description: "Foreign key to subcategories"
      - name: subcategory_name
        description: "Subcategory name (e.g. Daily meals)"
      - name: payment_method
        description: "cash | bank_transfer | credit_card | momo"
      - name: description
        description: "Free-text note on the transaction"
      - name: is_regretted
        description: "1 if the spend was marked as wasteful/impulse"
      - name: source
        description: "Ingestion service: nodejs or python"
