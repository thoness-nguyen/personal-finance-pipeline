# models/staging/stg_expenses.yml
# =============================================================================
# File: transformation/dbt_project/models/staging/stg_expenses.yml
# Purpose: Column-level documentation and generic test definitions for the
#          stg_expenses staging model.
# =============================================================================

version: 2

models:
  - name: stg_expenses
    description: "Cleaned and standardised expenses staging model"
    columns:
      - name: id
        description: "Primary key from the raw expenses table"
        tests:
          - not_null
          - unique
      - name: expense_date
        description: "Date the expense occurred"
        tests:
          - not_null
      - name: amount
        description: "Expense amount in the transaction currency"
        tests:
          - not_null
      - name: currency
        description: "ISO 4217 currency code, e.g. USD"
      - name: description
        description: "Free-text description of the expense"
      - name: merchant_id
        description: "Foreign key to the merchants table"
      - name: category_id
        description: "Foreign key to the categories table"
        tests:
          - not_null
      - name: payment_method
        description: "Payment method used (e.g. credit card, cash)"
      - name: source
        description: "Ingestion service that created this record"
