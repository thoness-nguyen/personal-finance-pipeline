# =============================================================================
# File: .github/workflows/dbt_run.yml
# Purpose: GitHub Actions workflow that runs dbt build and dbt test after the
#          ETL pipeline completes. Triggered by workflow_run completion of
#          the etl_pipeline workflow.
# =============================================================================

name: dbt Build & Test

on:
  workflow_run:
    workflows: ["ETL Pipeline"]
    types:
      - completed
  workflow_dispatch: {}

jobs:
  dbt-build:
    name: dbt Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize database schema
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -p"${{ secrets.MYSQL_PASSWORD }}" < database/schema/init.sql

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-mysql
        run: |
          pip install dbt-mysql

      - name: Write dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          finance_pipeline:
            target: dev
            outputs:
              dev:
                type: mysql
                server: "127.0.0.1"
                port: 3306
                database: "${{ secrets.MYSQL_DATABASE }}"
                username: "${{ secrets.MYSQL_USER }}"
                password: "${{ secrets.MYSQL_PASSWORD }}"
                schema: finance_db
          EOF

      - name: Install dbt packages
        working-directory: transformation/dbt_project
        run: dbt deps

      - name: Run dbt build
        working-directory: transformation/dbt_project
        run: dbt build

      - name: Run dbt tests
        working-directory: transformation/dbt_project
        run: dbt test
