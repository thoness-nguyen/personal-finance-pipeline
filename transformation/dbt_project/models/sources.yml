# models/sources.yml
# =============================================================================
# File: transformation/dbt_project/models/sources.yml
# Purpose: Declares the raw MySQL tables in finance_db as dbt sources so that
#          staging models can reference them via source() macro.
# =============================================================================

version: 2

sources:
  - name: finance_db
    description: "Raw tables in the finance MySQL database"
    database: finance_db
    schema: finance_db
    tables:
      - name: transactions
        description: "Fact table containing all money events (expenses, income, transfers, loans)"
      - name: categories
        description: "Lookup table for expense categories"
      - name: subcategories
        description: "Lookup table for subcategories, linked to categories"
      - name: accounts
        description: "Bank accounts and credit cards"
