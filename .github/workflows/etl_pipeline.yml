# =============================================================================
# File: .github/workflows/etl_pipeline.yml
# Purpose: GitHub Actions workflow that runs the pipeline orchestrator on a
#          daily schedule (2 AM UTC) and supports manual trigger.
#          Invokes orchestrator/run_pipeline.py to ingest expense files.
# =============================================================================

name: ETL Pipeline

on:
  schedule:
    - cron: "0 2 * * *"   # Daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      service:
        description: "Ingestion service to use (python | nodejs | auto)"
        required: false
        default: "auto"

jobs:
  run-etl:
    name: Run ETL Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install orchestrator dependencies
        run: |
          pip install httpx python-dotenv

      - name: Run pipeline orchestrator
        env:
          PYTHON_API_URL: ${{ secrets.PYTHON_API_URL }}
          NODEJS_API_URL: ${{ secrets.NODEJS_API_URL }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
        run: |
          python orchestrator/run_pipeline.py \
            --service "${{ github.event.inputs.service || 'auto' }}"
