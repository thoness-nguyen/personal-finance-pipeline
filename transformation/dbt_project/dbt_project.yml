# dbt_project.yml
# =============================================================================
# File: transformation/dbt_project/dbt_project.yml
# Purpose: Top-level dbt project configuration for the finance_pipeline project.
#          Defines model paths, target paths, and materialisation strategies.
# =============================================================================

name: 'finance_pipeline'
version: '1.0.0'
config-version: 2

profile: 'finance_pipeline'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  finance_pipeline:
    staging:
      +materialized: view
    marts:
      +materialized: table
