# models/staging/stg_expenses.yml
# =============================================================================
# File: transformation/dbt_project/models/staging/stg_expenses.yml
# Purpose: Column-level documentation and generic test definitions for the
#          stg_expenses staging model.
# =============================================================================

version: 2

models:
  - name: stg_expenses
    description: "Cleaned and standardised expenses staging model"
    columns:
      - name: id
        description: "transaction_id from the transactions table"
        tests:
          - not_null
          - unique
      - name: expense_date
        description: "Date the expense occurred"
        tests:
          - not_null
      - name: amount
        description: "Expense amount in VND"
        tests:
          - not_null
      - name: currency
        description: "ISO currency code from the account (e.g. VND)"
      - name: description
        description: "Free-text note on the transaction"
      - name: category_id
        description: "Foreign key to the categories table"
        tests:
          - not_null
      - name: category_name
        description: "Category name joined from categories"
      - name: subcategory_id
        description: "Foreign key to the subcategories table"
      - name: subcategory_name
        description: "Subcategory name joined from subcategories"
      - name: payment_method
        description: "Payment method used (cash, bank_transfer, credit_card, momo)"
      - name: spending_type
        description: "fixed = planned budget, extra = unplanned"
      - name: is_regretted
        description: "True if the spend was marked as wasteful/impulse"
      - name: source
        description: "Ingestion service that created this record (nodejs or python)"
