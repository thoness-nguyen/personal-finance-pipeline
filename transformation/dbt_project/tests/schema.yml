# tests/schema.yml
# =============================================================================
# File: transformation/dbt_project/tests/schema.yml
# Purpose: dbt generic tests (not_null, unique) applied to key columns in
#          staging and mart models to ensure data quality.
# =============================================================================

version: 2

models:
  - name: stg_expenses
    columns:
      - name: id
        tests:
          - not_null
          - unique
      - name: expense_date
        tests:
          - not_null
      - name: amount
        tests:
          - not_null
      - name: category_id
        tests:
          - not_null

  - name: mart_monthly_summary
    columns:
      - name: yr
        tests:
          - not_null
      - name: mo
        tests:
          - not_null
      - name: total_spend
        tests:
          - not_null

  - name: mart_category_breakdown
    columns:
      - name: yr
        tests:
          - not_null
      - name: category_name
        tests:
          - not_null
      - name: total_spend
        tests:
          - not_null

  - name: mart_top_merchants
    columns:
      - name: merchant
        tests:
          - not_null
      - name: total_spend
        tests:
          - not_null

  - name: mart_top_merchants
    columns:
      - name: placeholder
        tests:
          - not_null
